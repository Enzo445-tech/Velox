<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coliexpresse — Suivi de colis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    /* Personnalisation de la barre de défilement pour un look pro */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
  </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen selection:bg-zinc-800 selection:text-white">

  <header class="sticky top-0 z-50 border-b border-zinc-900 bg-black/80 backdrop-blur-md">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
          <span class="text-black font-bold text-xl leading-none tracking-tighter">C</span>
        </div>
        <span class="text-lg font-semibold tracking-tight">Coliexpresse</span>
      </div>
      <span class="text-xs font-medium uppercase tracking-widest text-zinc-500">Plateforme de suivi</span>
    </div>
  </header>

  <main class="relative z-10 max-w-4xl mx-auto px-6 pt-24 pb-24">
    
    <section class="text-center mb-16">
      <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-6 text-white">
        Suivi de colis <br class="hidden md:block text-zinc-500">
        <span class="text-zinc-500">simplifié.</span>
      </h1>
      <p class="text-zinc-400 text-lg max-w-xl mx-auto">
        Détection automatique du transporteur et historique détaillé de vos expéditions en temps réel.
      </p>
    </section>

    <section class="bg-zinc-950 border border-zinc-800 rounded-2xl p-2 shadow-2xl shadow-white/[0.02]">
      <div class="flex flex-col md:flex-row gap-2">
        <input 
          id="trackingInput" 
          type="text"
          class="flex-1 bg-transparent outline-none px-6 py-4 text-white placeholder:text-zinc-600" 
          placeholder="Entrez votre numéro de suivi..."
        >
        <div class="w-full md:w-px bg-zinc-800 my-2 md:my-0"></div>
        <select id="carrierSelect" class="bg-transparent outline-none border-none px-6 py-4 text-zinc-300 cursor-pointer appearance-none">
          <option value="auto" class="bg-zinc-900 text-white">Transporteur auto</option>
          <option value="laposte" class="bg-zinc-900 text-white">La Poste / Colissimo</option>
          <option value="chronopost" class="bg-zinc-900 text-white">Chronopost</option>
          <option value="dhl" class="bg-zinc-900 text-white">DHL</option>
          <option value="ups" class="bg-zinc-900 text-white">UPS</option>
          <option value="fedex" class="bg-zinc-900 text-white">FedEx</option>
        </select>
        <button 
          onclick="trackPackage()" 
          class="bg-white hover:bg-zinc-200 text-black transition-colors rounded-xl px-8 py-4 font-semibold whitespace-nowrap"
        >
          Rechercher
        </button>
      </div>
    </section>

    <section id="result" class="mt-12"></section>

  </main>

  <script>
    async function trackPackage() {
      const numberInput = document.getElementById('trackingInput');
      const number = numberInput.value.trim();
      const carrier = document.getElementById('carrierSelect').value;
      const result = document.getElementById('result');

      if (!number) {
        result.innerHTML = `
          <div class="border border-red-900/30 bg-red-950/20 rounded-2xl p-6 text-center text-red-400 text-sm font-medium">
            Veuillez entrer un numéro de suivi valide.
          </div>`;
        numberInput.focus();
        return;
      }

      // État de chargement
      result.innerHTML = `
        <div class="border border-zinc-800 rounded-2xl p-12 text-center text-zinc-500 animate-pulse flex flex-col items-center justify-center gap-4">
          <div class="w-6 h-6 border-2 border-zinc-600 border-t-white rounded-full animate-spin"></div>
          Interrogation des serveurs en cours...
        </div>`;

      try {
        // Correction de l'appel API : on injecte proprement le numéro de suivi dans l'URL
        const apiUrl = `https://coliexpresse.vercel.app/api/track?tracking=${encodeURIComponent(number)}`;
        
        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error('Impossible de récupérer les informations pour ce numéro.');
        }

        const data = await response.json();
        
        // Sécurisation de l'accès aux données (évite les crashs si l'API renvoie un format inattendu)
        const tracking = data?.data?.tracking || data;

        if (!tracking || Object.keys(tracking).length === 0) {
           throw new Error('Aucune information trouvée pour ce colis.');
        }

        const checkpoints = tracking.checkpoints || [];
        
        // Définition de la pastille de couleur selon le statut (vert si livré, bleu sinon)
        const isDelivered = tracking.tag === 'Delivered' || tracking.tag === 'Livré';
        const statusColorClass = isDelivered ? 'bg-emerald-500' : 'bg-blue-500';

        result.innerHTML = `
          <div class="border border-zinc-800 bg-zinc-950 rounded-2xl p-8 shadow-xl">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-8 border-b border-zinc-800/50">
              <div>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1">Transporteur</p>
                <h2 class="text-2xl font-semibold text-white capitalize">${tracking.slug || (carrier !== 'auto' ? carrier : 'Non identifié')}</h2>
              </div>
              <div>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1">Statut actuel</p>
                <div class="flex items-center gap-3 mt-1">
                  <span class="w-2.5 h-2.5 rounded-full ${statusColorClass} shadow-[0_0_10px_rgba(255,255,255,0.2)]"></span>
                  <p class="text-white text-xl font-medium">${tracking.tag || 'En cours de traitement'}</p>
                </div>
              </div>
            </div>

            <div class="pt-8">
              <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-6">Historique des événements</p>
              
              <div class="space-y-6">
                ${checkpoints.map((item, index) => {
                  const isFirst = index === 0;
                  return `
                  <div class="relative pl-8 border-l border-zinc-800 last:border-transparent">
                    <div class="absolute w-3 h-3 bg-black border-2 ${isFirst ? 'border-white' : 'border-zinc-700'} rounded-full -left-[6.5px] top-1.5"></div>
                    
                    <div class="${isFirst ? 'text-white font-medium' : 'text-zinc-400'} text-base">
                      ${item.message || 'Mise à jour du statut'}
                    </div>
                    
                    <div class="text-sm text-zinc-600 mt-1 flex items-center gap-2">
                      ${item.location ? `<span>${item.location}</span> <span>•</span>` : ''}
                      <span>${item.checkpoint_time ? new Date(item.checkpoint_time).toLocaleString('fr-FR', {
                        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
                      }) : 'Date inconnue'}</span>
                    </div>
                  </div>
                `}).join('') || '<p class="text-zinc-500 text-sm italic">Aucun événement enregistré pour le moment.</p>'}
              </div>
            </div>

          </div>`;
      } catch (e) {
        result.innerHTML = `
          <div class="border border-red-900/30 bg-red-950/20 rounded-2xl p-6 text-red-400 text-sm font-medium">
            Erreur : ${e.message}
          </div>`;
      }
    }
  </script>
</body>
</html>
