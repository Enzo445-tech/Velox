<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coliexpresse | Système de suivi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    /* Barre de défilement pro */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #333; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body class="bg-black text-gray-200 min-h-screen selection:bg-gray-800 selection:text-white">

  <header class="border-b border-gray-900 bg-black sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 bg-white text-black flex items-center justify-center font-bold text-lg">C</div>
        <span class="text-white font-semibold tracking-wide">Coliexpresse</span>
      </div>
      <span class="text-xs font-mono text-gray-500 uppercase tracking-widest">Tracking System</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 pt-20 pb-24">
    
    <section class="mb-12">
      <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-white mb-4">Suivi de colis.</h1>
      <p class="text-gray-400 text-lg">Consultez l'historique complet et chaque étape de votre expédition en temps réel.</p>
    </section>

    <section class="bg-black border border-gray-800 flex flex-col md:flex-row focus-within:border-gray-500 transition-colors">
      <input 
        id="trackingInput" 
        type="text"
        class="flex-1 bg-transparent outline-none px-6 py-4 text-white placeholder-gray-600" 
        placeholder="Saisir le numéro de suivi"
      >
      <div class="w-full md:w-px bg-gray-800"></div>
      <select id="carrierSelect" class="bg-transparent border-none px-6 py-4 text-gray-400 outline-none cursor-pointer appearance-none md:w-64">
        <option value="auto" class="bg-black text-white">Détection automatique</option>
        <option value="fr.laposte" class="bg-black text-white">La Poste / Colissimo</option>
        <option value="fr.chronopost" class="bg-black text-white">Chronopost</option>
        <option value="us.dhl" class="bg-black text-white">DHL</option>
        <option value="us.ups" class="bg-black text-white">UPS</option>
        <option value="us.fedex" class="bg-black text-white">FedEx</option>
      </select>
      <button 
        onclick="trackPackage()" 
        class="bg-white hover:bg-gray-200 text-black px-10 py-4 font-semibold transition-colors"
      >
        Rechercher
      </button>
    </section>

    <section id="result" class="mt-12"></section>

  </main>

  <script>
    async function trackPackage() {
      const numberInput = document.getElementById('trackingInput');
      const number = numberInput.value.trim();
      const carrier = document.getElementById('carrierSelect').value;
      const result = document.getElementById('result');

      if (!number) {
        result.innerHTML = `
          <div class="border border-gray-800 bg-gray-900/50 p-6 text-gray-400 text-sm">
            Veuillez renseigner un numéro de suivi.
          </div>`;
        numberInput.focus();
        return;
      }

      // État de chargement
      result.innerHTML = `
        <div class="border border-gray-900 p-12 flex flex-col items-center justify-center gap-4">
          <div class="w-5 h-5 border-2 border-gray-800 border-t-white rounded-full animate-spin"></div>
          <span class="text-gray-500 text-sm font-mono uppercase tracking-widest">Connexion WhereParcel...</span>
        </div>`;

      try {
        // Appel propre vers ton Vercel (qui fait le pont avec WhereParcel)
        // On passe le transporteur en paramètre au cas où ton backend en a besoin
        const apiUrl = `https://coliexpresse.vercel.app/api/track?tracking=${encodeURIComponent(number)}&carrier=${encodeURIComponent(carrier)}`;
        
        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error('Données introuvables ou erreur serveur.');
        }

        const json = await response.json();
        
        // Sécurisation de la lecture des données (gère plusieurs formats de réponse WhereParcel/Vercel)
        const tracking = json.data?.tracking || json.tracking || json.data || json;

        if (!tracking || Object.keys(tracking).length === 0) {
           throw new Error('Aucun historique trouvé pour ce numéro.');
        }

        // Récupération du tableau des étapes de WhereParcel
        const events = tracking.events || tracking.checkpoints || tracking.history || [];
        
        // Définition de l'unique touche de couleur (Vert pour livré, Bleu pour le reste)
        const currentStatus = tracking.tag || tracking.status || 'En cours';
        const isDelivered = currentStatus.toLowerCase().includes('delivered') || currentStatus.toLowerCase().includes('livré');
        const statusDot = isDelivered ? 'bg-emerald-500' : 'bg-blue-500';

        // Construction de la timeline pour CHAQUE étape
        let timelineHTML = '';
        if (events.length === 0) {
          timelineHTML = '<p class="text-gray-500 text-sm">Aucune étape détaillée disponible pour le moment.</p>';
        } else {
          timelineHTML = '<div class="space-y-6">';
          events.forEach((event, index) => {
            const isFirst = index === 0; // Le dernier événement enregistré (plus récent)
            const message = event.message || event.description || event.status || 'Mise à jour du statut';
            const location = event.location || event.city || '';
            const dateStr = event.checkpoint_time || event.date || event.timestamp;
            const date = dateStr ? new Date(dateStr).toLocaleString('fr-FR', {
              day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
            }) : 'Date inconnue';
